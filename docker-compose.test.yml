services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=StorageLabelsTest
      - POSTGRES_USER=storage_test_user
      - POSTGRES_PASSWORD=storage_test_password
    ports:
      - '5433:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage_test_user -d StorageLabelsTest"]
      interval: 5s
      timeout: 5s
      retries: 5
