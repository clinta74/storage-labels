name: Build and Push API Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'storage-labels-api/**'
      - 'storage-labels-api-test/**'
      - '.github/workflows/build-api.yml'
    tags:
      - 'api-v*.*.*'  # Trigger on manual API version tags
  pull_request:
    branches:
      - main
    paths:
      - 'storage-labels-api/**'
      - 'storage-labels-api-test/**'
  workflow_dispatch:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres-test:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: StorageLabelsTest
          POSTGRES_USER: storage_test_user
          POSTGRES_PASSWORD: storage_test_password
        ports:
          - 5433:5432
        options: >
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DATABASE: StorageLabelsTest
          POSTGRES_USERNAME: storage_test_user
          POSTGRES_PASSWORD: storage_test_password
        run: dotnet test --no-build --configuration Release --verbosity normal

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: write  # Required to push tags and create releases
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for git describe
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tag is from main branch
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref }})
          if ! git merge-base --is-ancestor $TAG_COMMIT origin/main; then
            echo "Error: Tag ${{ github.ref_name }} is not on the main branch"
            exit 1
          fi
          echo "Tag ${{ github.ref_name }} verified to be from main branch"

      - name: Get latest tag
        id: get_tag
        run: |
          # Check if this is a manual tag push
          if [[ "${{ github.ref }}" == refs/tags/api-v* ]]; then
            echo "MANUAL_TAG=true" >> $GITHUB_OUTPUT
            CURRENT_TAG="${{ github.ref_name }}"
            echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_OUTPUT
            echo "Manual tag detected: $CURRENT_TAG"
          else
            echo "MANUAL_TAG=false" >> $GITHUB_OUTPUT
          fi

          # Get the latest semver tag for API, or default to v0.0.0
          LATEST_TAG=$(git tag -l "api-v*" --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="api-v0.0.0"
          fi
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Generate version number
        id: version
        run: |
          # If manual tag was pushed, use it
          if [[ "${{ steps.get_tag.outputs.MANUAL_TAG }}" == "true" ]]; then
            NEW_VERSION="${{ steps.get_tag.outputs.CURRENT_TAG }}"
            VERSION_NUMBER="${NEW_VERSION#api-v}"
            MAJOR=$(echo "$VERSION_NUMBER" | cut -d. -f1)
            echo "Using manual tag: $NEW_VERSION"
          else
            # Parse the latest tag and auto-increment patch
            LATEST_TAG=${{ steps.get_tag.outputs.LATEST_TAG }}
            VERSION=${LATEST_TAG#api-v}

            # Split into major.minor.patch
            IFS='.' read -ra PARTS <<< "$VERSION"
            MAJOR=${PARTS[0]:-0}
            MINOR=${PARTS[1]:-0}
            PATCH=${PARTS[2]:-0}

            # Auto-increment patch version
            PATCH=$((PATCH + 1))

            NEW_VERSION="api-v$MAJOR.$MINOR.$PATCH"
            VERSION_NUMBER="$MAJOR.$MINOR.$PATCH"
            echo "Auto-generated version: $NEW_VERSION"
          fi

          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_OUTPUT
          echo "MAJOR_VERSION=$MAJOR" >> $GITHUB_OUTPUT
          echo "Final version: $NEW_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/storage-labels-api
          tags: |
            type=raw,value=v${{ steps.version.outputs.VERSION_NUMBER }}
            type=raw,value=v${{ steps.version.outputs.MAJOR_VERSION }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=stable,enable={{is_default_branch}}
            type=sha,prefix=sha-
          flavor: |
            latest=false

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./storage-labels-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION_NUMBER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Create and push tag
        if: steps.get_tag.outputs.MANUAL_TAG == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.VERSION }}
          git push origin ${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.VERSION }}
          name: API Release ${{ steps.version.outputs.VERSION }}
          generateReleaseNotes: true
          makeLatest: true
